name: Deploy GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: client
    env:
      VITE_API_URL: https://fiscal-api-5eok.onrender.com
      VITE_FISCAL_R2_BASE_URL: ${{ vars.VITE_FISCAL_R2_BASE_URL }}
      VITE_OFFLINE_DB_PUBLIC_SEED: ${{ vars.VITE_OFFLINE_DB_PUBLIC_SEED }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
      VITE_CLERK_TOKEN_TEMPLATE: backend_api
      # Temporary: GitHub Pages is deployed without a custom domain, so Clerk pk_live cannot be used yet.
      # Remove this override after moving Pages to a Clerk production domain and setting pk_live.
      ALLOW_TEST_CLERK_KEY: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Clerk key
        run: |
          if [ -z "${VITE_CLERK_PUBLISHABLE_KEY}" ]; then
            echo "Missing GitHub repository variable VITE_CLERK_PUBLISHABLE_KEY"
            exit 1
          fi
          if [ -z "${VITE_OFFLINE_DB_PUBLIC_SEED}" ]; then
            echo "Missing GitHub repository variable VITE_OFFLINE_DB_PUBLIC_SEED"
            exit 1
          fi

      - name: Validate public R2 offline bundle
        run: |
          bundled_metadata="../database/r2/fiscal_offline.meta.json"
          bundled_bundle="../database/r2/fiscal_offline.enc"
          if [ ! -f "$bundled_metadata" ] || [ ! -f "$bundled_bundle" ]; then
            echo "::error::Bundled offline fallback is missing. Run scripts/build_r2_fiscal_bundles.py and commit database/r2/fiscal_offline.*"
            exit 1
          fi
          metadata_url="${VITE_FISCAL_R2_BASE_URL%/}/fiscal_offline.meta.json"
          bundle_url="${VITE_FISCAL_R2_BASE_URL%/}/fiscal_offline.enc"
          check_public_url() {
            label="$1"
            url="$2"
            if ! status="$(curl --silent --show-error --head --connect-timeout 10 --max-time 30 --output /dev/null --write-out "%{http_code}" "$url")"; then
              echo "::error::$label check failed at $url"
              exit 1
            fi
            if [ "$status" = "404" ]; then
              echo "::warning::$label not found at $url"
              return
            fi
            if [ "${status#2}" = "$status" ] && [ "${status#3}" = "$status" ]; then
              echo "::error::$label returned HTTP $status at $url"
              exit 1
            fi
          }
          if [ -n "${VITE_FISCAL_R2_BASE_URL}" ]; then
            check_public_url "R2 offline metadata" "$metadata_url"
            check_public_url "R2 offline bundle" "$bundle_url"
          else
            echo "::notice::VITE_FISCAL_R2_BASE_URL is not set; Pages will rely on bundled fiscal-bases fallback."
          fi

      - name: Patch app for GitHub Pages project path
        run: |
          node -e "const fs=require('node:fs'); const indexPath='index.html'; let html=fs.readFileSync(indexPath,'utf8'); html=html.replace('href=\"/vite.svg\"','href=\"./vite.svg\"'); html=html.replace('src=\"/src/main.tsx\"','src=\"./src/main.tsx\"'); fs.writeFileSync(indexPath,html);"
          node -e "const fs=require('node:fs'); const headerPath='src/components/Header.tsx'; let text=fs.readFileSync(headerPath,'utf8'); text=text.replace(\"await signOut({ redirectUrl: '/' });\",\"const redirectUrl = new URL(import.meta.env.BASE_URL, window.location.origin).toString();\\n            await signOut({ redirectUrl });\"); fs.writeFileSync(headerPath,text);"

      - name: Build frontend
        run: npm run build -- --base=/FiscalConsultas/

      - name: Add SPA fallback
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Validate Pages offline fallback assets
        run: |
          test -s dist/fiscal-bases/fiscal_offline.meta.json
          test -s dist/fiscal-bases/fiscal_offline.enc

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
