name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7
        with:
          enable-cache: true

      - name: Install backend dependencies
        run: uv sync --group dev

      - name: Validate offline bundle contract
        run: |
          python - <<'PY'
          from pathlib import Path
          enc = Path("database/fiscal_offline.enc")
          meta = Path("database/fiscal_offline.meta")
          source_dbs = [
              Path("database/nesh.db"),
              Path("database/tipi.db"),
              Path("database/services.db"),
          ]
          existing_source_dbs = [path for path in source_dbs if path.exists()]

          if enc.exists() != meta.exists():
              raise SystemExit(
                  "Offline bundle contract broken: fiscal_offline.enc and fiscal_offline.meta must exist together."
              )

          if existing_source_dbs and len(existing_source_dbs) != len(source_dbs):
              raise SystemExit(
                  "Offline bundle sources are partially present. Either provide all source databases or none."
              )

          if len(existing_source_dbs) == len(source_dbs):
              print("Source databases detected. Validating offline bundle build script...")
          else:
              print("Source databases not present in CI checkout. Skipping bundle generation, keeping contract check only.")
          PY

      - name: Lint with Ruff
        run: |
          uv run ruff format --check
          uv run ruff check

      - name: Type check migrations with Pyright
        run: uv run pyright migrations

      - name: Lint migrations with Pylint (reliable error subset)
        run: >
          uv run pylint
          migrations/env.py
          migrations/versions/001_initial.py
          migrations/versions/006_precomputed_columns_and_gin.py
          --disable=all --enable=E,F --disable=E0401,E1101

      - name: Run backend tests
        run: uv run pytest -q --cov=backend --cov-report=xml --cov-report=term-missing --cov-fail-under=70

      - name: Upload backend coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: backend-coverage
          path: coverage.xml
  frontend:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Lint frontend
        working-directory: client
        run: npm run lint

      - name: Type check frontend
        working-directory: client
        run: npm run type-check

      - name: Run frontend tests with coverage
        working-directory: client
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: frontend-coverage
          path: client/coverage
